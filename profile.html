<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宣材プロフィール作成</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  @media print {
    html, body { margin: 0 !important; padding: 0 !important; background: #fff !important; }
    .input-panel { display: none !important; }
    .layout { display: block !important; }
    .preview-wrap { display: block !important; width: auto !important; padding: 0 !important; margin: 0 !important; background: #fff !important; overflow: visible !important; }
    .page { box-shadow: none !important; margin: 0 !important; }
    .photo-slot-overlay { display: none !important; }
    .page-break { page-break-before: always; }
    @page { size: A4; margin: 0; }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Hiragino Mincho ProN", "Yu Mincho", "游明朝", serif; font-size: 12px; color: #222; background: #e8e8e8; }

  .layout { display: flex; height: 100vh; }
  .preview-wrap { flex: 1; overflow: auto; display: flex; flex-direction: column; align-items: center; padding: 24px; gap: 24px; background: #ddd; }
  .input-panel { width: 400px; background: #fff; border-left: 1px solid #ccc; overflow-y: auto; padding: 20px 24px; flex-shrink: 0; font-family: "Hiragino Sans", sans-serif; }

  .panel-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #222; }
  .section-label { font-size: 12px; font-weight: 700; color: #333; margin: 18px 0 8px; padding-top: 10px; border-top: 1px solid #eee; }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 11px; color: #666; margin-bottom: 3px; font-weight: 600; }
  .field input, .field textarea, .field select { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; font-family: inherit; }
  .field input:focus, .field textarea:focus { outline: none; border-color: #888; }
  .field textarea { resize: vertical; min-height: 50px; }
  .field-row { display: flex; gap: 8px; }
  .field-row .field { flex: 1; }
  .custom-field-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
  .custom-field-row input { flex: 1; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }
  .sns-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
  .sns-row select { width: 90px; padding: 6px; font-size: 12px; }
  .sns-row input { flex: 1; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }
  .sns-row input.followers { width: 70px; flex: none; }
  .btn-small { padding: 5px 12px; border: 1px solid #ccc; border-radius: 4px; background: #f5f5f5; font-size: 11px; cursor: pointer; font-family: inherit; }
  .btn-small:hover { background: #eee; }
  .btn-row { display: flex; gap: 6px; margin: 6px 0 12px; }
  .btn-print { width: 100%; padding: 12px; background: #222; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 16px; font-family: inherit; }
  .btn-print:hover { background: #444; }
  input[type="file"] { display: none; }

  .photo-slot-ctrl { margin-bottom: 10px; background: #f8f8f8; border: 1px solid #eee; border-radius: 6px; padding: 10px 12px; }
  .photo-slot-ctrl .slot-title { font-size: 11px; font-weight: 700; color: #555; margin-bottom: 6px; }
  .photo-slot-ctrl .slot-row { display: flex; gap: 8px; align-items: center; }
  .photo-slot-ctrl .slot-thumb { width: 40px; height: 40px; background: #eee; border-radius: 4px; overflow: hidden; flex-shrink: 0; }
  .photo-slot-ctrl .slot-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .photo-slot-ctrl .slot-range { flex: 1; }
  .photo-slot-ctrl .slot-range label { font-size: 10px; color: #888; }
  .photo-slot-ctrl .slot-range input { width: 100%; }

  /* Page */
  .page { width: 210mm; min-height: 297mm; background: #fff; padding: 16mm 18mm; flex-shrink: 0; position: relative; }

  .p-top { display: flex; gap: 20px; margin-bottom: 16px; }
  .p-top-left { flex: 1; }
  .p-top-right { width: 170px; flex-shrink: 0; }

  .p-name-en { font-size: 11px; color: #888; margin-bottom: 2px; font-family: "Helvetica Neue", Helvetica, sans-serif; }
  .p-name-jp { font-size: 28px; font-weight: 900; margin-bottom: 16px; letter-spacing: 3px; }

  .p-info-table { width: 100%; }
  .p-info-table td { padding: 2px 0; font-size: 11.5px; vertical-align: top; line-height: 1.7; }
  .p-info-table td.lbl { font-weight: 700; white-space: nowrap; width: 95px; }

  .photo-slot { width: 100%; overflow: hidden; border-radius: 4px; background: #f5f5f5; position: relative; cursor: move; }
  .photo-slot img { width: 100%; display: block; pointer-events: none; transform-origin: center center; }
  .photo-slot-empty { display: flex; align-items: center; justify-content: center; color: #ccc; font-size: 11px; font-family: sans-serif; }
  .photo-slot-overlay { position: absolute; bottom: 4px; right: 4px; background: rgba(0,0,0,0.5); color: #fff; font-size: 9px; padding: 2px 6px; border-radius: 3px; pointer-events: none; font-family: sans-serif; }

  .p-section { margin-bottom: 14px; }
  .p-section-title { font-size: 14px; font-weight: 700; margin-bottom: 6px; padding-bottom: 4px; border-bottom: 2px solid #222; }
  .p-section-body { font-size: 11.5px; line-height: 1.9; }
  .p-section-body ul { padding-left: 18px; }
  .p-section-body li { margin-bottom: 1px; }

  .p-sns-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .p-sns-item { display: flex; align-items: center; gap: 8px; font-size: 10.5px; }
  .p-sns-qr { width: 44px; height: 44px; flex-shrink: 0; }
  .p-sns-qr canvas, .p-sns-qr img { width: 44px !important; height: 44px !important; }
  .p-sns-name { font-weight: 700; font-size: 11px; }
  .p-sns-handle { color: #555; }
  .p-sns-followers { color: #888; font-size: 9px; }

  .p-contact { background: #f8f8f8; border: 1px solid #eee; border-radius: 4px; padding: 10px 14px; margin-top: 14px; font-size: 10.5px; line-height: 1.9; }
  .p-contact-title { font-weight: 700; margin-bottom: 4px; font-size: 11.5px; }

  .p-bottom-photo { margin-top: 14px; }

  .page2 { padding-top: 20mm; }
  .p-photos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .p-photos-grid .photo-slot { border-radius: 6px; }
</style>
</head>
<body>

<div class="layout">
  <div class="preview-wrap" id="previewWrap"></div>

  <div class="input-panel">
    <div class="panel-title">宣材プロフィール作成</div>

    <div class="section-label">基本情報</div>
    <div class="field-row">
      <div class="field"><label>名前（日本語）</label><input type="text" id="fNameJp" placeholder="山本 裕子"></div>
      <div class="field"><label>名前（ローマ字）</label><input type="text" id="fNameEn" placeholder="Yuko Yamamoto"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>生年月日</label><input type="text" id="fBirth" placeholder="1998/5/12"></div>
      <div class="field"><label>年齢</label><input type="text" id="fAge" placeholder="26歳"></div>
    </div>
    <div class="field"><label>出身地</label><input type="text" id="fFrom" placeholder="北海道札幌市"></div>
    <div class="field-row">
      <div class="field"><label>身長・体重</label><input type="text" id="fBody" placeholder="165cm 48kg"></div>
      <div class="field"><label>スリーサイズ</label><input type="text" id="fThree" placeholder="B82 W61 H88"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>靴サイズ</label><input type="text" id="fShoe" placeholder="23.5cm"></div>
      <div class="field"><label>資格</label><input type="text" id="fLicense" placeholder="教員免許、自動車免許"></div>
    </div>

    <div class="section-label">追加項目</div>
    <div id="customFields"></div>
    <div class="btn-row"><button class="btn-small" onclick="addCustomField()">+ 項目追加</button></div>

    <div class="section-label">特技・趣味</div>
    <div class="field"><label>特技</label><input type="text" id="fSkill" placeholder="麻雀、スキー"></div>
    <div class="field"><label>趣味</label><input type="text" id="fHobby" placeholder="TVや映画を見る、ラジオを聞く"></div>

    <div class="section-label">SNS</div>
    <div id="snsFields"></div>
    <div class="btn-row"><button class="btn-small" onclick="addSns()">+ SNS追加</button></div>

    <div class="section-label">実績</div>
    <div class="field"><textarea id="fRecord" rows="5" placeholder="1行1項目で記入"></textarea></div>

    <div class="section-label">連絡先</div>
    <div class="field"><label>事務所 / 所属</label><input type="text" id="fAgency" placeholder="○○プロダクション"></div>
    <div class="field"><label>担当者名</label><input type="text" id="fContactName" placeholder="田中 太郎"></div>
    <div class="field-row">
      <div class="field"><label>メール</label><input type="text" id="fContactEmail" placeholder="info@example.com"></div>
      <div class="field"><label>電話</label><input type="text" id="fContactTel" placeholder="03-1234-5678"></div>
    </div>

    <div class="section-label">写真</div>
    <div id="photoControls"></div>

    <button class="btn-print" onclick="window.print()">PDF出力</button>
  </div>
</div>

<script>
// Photo slots: fixed positions
var photoSlots = [
  { id: 'main', label: 'メイン写真（右上）', src: null, scale: 1, offsetX: 0, offsetY: 0, height: 210 },
  { id: 'sub', label: 'サブ写真（右下）', src: null, scale: 1, offsetX: 0, offsetY: 0, height: 180 }
];
var snsEntries = [];
var customFieldEntries = [];

addSns('Instagram', '', '');
addSns('X', '', '');

renderPhotoControls();
bindInputs();
render();

function bindInputs() {
  document.querySelectorAll('.input-panel input, .input-panel textarea').forEach(function(el) {
    el.addEventListener('input', render);
  });
}

// Photo controls
function renderPhotoControls() {
  var container = document.getElementById('photoControls');
  container.innerHTML = '';
  photoSlots.forEach(function(slot, idx) {
    var div = document.createElement('div');
    div.className = 'photo-slot-ctrl';
    var thumbHtml = slot.src ? '<img src="' + slot.src + '">' : '';
    div.innerHTML = '<div class="slot-title">' + slot.label + '</div>' +
      '<div class="slot-row">' +
      '<div class="slot-thumb">' + thumbHtml + '</div>' +
      '<div style="flex:1;">' +
      '<button class="btn-small" onclick="pickPhoto(' + idx + ')">画像選択</button>' +
      (slot.src ? ' <button class="btn-small" onclick="clearPhoto(' + idx + ')">削除</button>' : '') +
      '</div></div>' +
      (slot.src ? '<div class="slot-range"><label>拡大率</label><input type="range" min="100" max="300" value="' + Math.round(slot.scale * 100) + '" oninput="setScale(' + idx + ', this.value)"></div>' : '');
    container.appendChild(div);
  });

  // Extra photos button
  var extraBtn = document.createElement('div');
  extraBtn.style.marginTop = '8px';
  extraBtn.innerHTML = '<button class="btn-small" onclick="addPhotoSlot()">+ 追加写真スロット（2ページ目）</button>';
  container.appendChild(extraBtn);
}

function pickPhoto(idx) {
  var input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.addEventListener('change', function() {
    if (!this.files[0]) return;
    var reader = new FileReader();
    reader.onload = function(e) {
      photoSlots[idx].src = e.target.result;
      photoSlots[idx].scale = 1;
      photoSlots[idx].offsetX = 0;
      photoSlots[idx].offsetY = 0;
      renderPhotoControls();
      render();
    };
    reader.readAsDataURL(this.files[0]);
  });
  input.click();
}

function clearPhoto(idx) {
  photoSlots[idx].src = null;
  renderPhotoControls();
  render();
}

function setScale(idx, val) {
  photoSlots[idx].scale = val / 100;
  render();
}

function addPhotoSlot() {
  var n = photoSlots.length + 1;
  photoSlots.push({ id: 'extra' + n, label: '追加写真 ' + (n - 2), src: null, scale: 1, offsetX: 0, offsetY: 0, height: 240 });
  renderPhotoControls();
  render();
}

// SNS
function addSns(p, h, f) {
  snsEntries.push({ platform: p || 'Instagram', handle: h || '', followers: f || '' });
  renderSnsInputs();
  render();
}
function removeSns(idx) { snsEntries.splice(idx, 1); renderSnsInputs(); render(); }
function renderSnsInputs() {
  var c = document.getElementById('snsFields'); c.innerHTML = '';
  snsEntries.forEach(function(e, i) {
    var r = document.createElement('div'); r.className = 'sns-row';
    r.innerHTML = '<select data-idx="'+i+'" data-field="platform"><option'+(e.platform==='Instagram'?' selected':'')+'>Instagram</option><option'+(e.platform==='X'?' selected':'')+'>X</option><option'+(e.platform==='TikTok'?' selected':'')+'>TikTok</option><option'+(e.platform==='YouTube'?' selected':'')+'>YouTube</option><option'+(e.platform==='その他'?' selected':'')+'>その他</option></select><input placeholder="@account" value="'+(e.handle||'')+'" data-idx="'+i+'" data-field="handle"><input class="followers" placeholder="フォロワー" value="'+(e.followers||'')+'" data-idx="'+i+'" data-field="followers"><button class="btn-small" onclick="removeSns('+i+')">×</button>';
    c.appendChild(r);
    r.querySelectorAll('input,select').forEach(function(el) { el.addEventListener('input', function() { snsEntries[this.dataset.idx][this.dataset.field]=this.value; render(); }); });
  });
}

// Custom fields
function addCustomField() { customFieldEntries.push({label:'',value:''}); renderCustomFields(); }
function removeCustomField(i) { customFieldEntries.splice(i,1); renderCustomFields(); render(); }
function renderCustomFields() {
  var c = document.getElementById('customFields'); c.innerHTML = '';
  customFieldEntries.forEach(function(e,i) {
    var r = document.createElement('div'); r.className = 'custom-field-row';
    r.innerHTML = '<input placeholder="項目名" value="'+(e.label||'')+'" data-idx="'+i+'" data-field="label" style="width:80px;flex:none;"><input placeholder="内容" value="'+(e.value||'')+'" data-idx="'+i+'" data-field="value"><button class="btn-small" onclick="removeCustomField('+i+')">×</button>';
    c.appendChild(r);
    r.querySelectorAll('input').forEach(function(el) { el.addEventListener('input', function() { customFieldEntries[this.dataset.idx][this.dataset.field]=this.value; render(); }); });
  });
}

function getSnsUrl(p, h) {
  var a = h.replace(/^@/,'');
  if(p==='Instagram') return 'https://instagram.com/'+a;
  if(p==='X') return 'https://x.com/'+a;
  if(p==='TikTok') return 'https://tiktok.com/@'+a;
  if(p==='YouTube') return 'https://youtube.com/@'+a;
  return '';
}

function val(id) { var el=document.getElementById(id); return el?el.value.trim():''; }

function makePhotoSlotHtml(slot, height) {
  if (!slot.src) return '<div class="photo-slot photo-slot-empty" style="height:'+height+'px;">クリックで画像選択</div>';
  var s = slot.scale;
  return '<div class="photo-slot" style="height:'+height+'px;" data-slot-id="'+slot.id+'">' +
    '<img src="'+slot.src+'" style="transform: scale('+s+') translate('+slot.offsetX+'px,'+slot.offsetY+'px);">' +
    '<div class="photo-slot-overlay">ドラッグで位置調整</div></div>';
}

function render() {
  var wrap = document.getElementById('previewWrap');
  wrap.innerHTML = '';

  // Page 1
  var page = document.createElement('div');
  page.className = 'page';

  var mainSlot = photoSlots[0];
  var subSlot = photoSlots[1];

  // Top section
  var html = '<div class="p-top"><div class="p-top-left">';
  html += '<div class="p-name-en">' + val('fNameEn') + '</div>';
  html += '<div class="p-name-jp">' + val('fNameJp') + '</div>';
  html += '<table class="p-info-table">';

  var fields = [
    ['生年月日', val('fBirth')], ['年齢', val('fAge')], ['出身地', val('fFrom')],
    ['身長・体重', val('fBody')], ['スリーサイズ', val('fThree')],
    ['靴サイズ', val('fShoe')], ['資格', val('fLicense')]
  ];
  customFieldEntries.forEach(function(cf) { if(cf.label||cf.value) fields.push([cf.label, cf.value]); });
  fields.forEach(function(f) { if(f[1]) html += '<tr><td class="lbl">'+f[0]+'　：</td><td>'+f[1]+'</td></tr>'; });
  html += '</table></div>';
  html += '<div class="p-top-right">' + makePhotoSlotHtml(mainSlot, 210) + '</div></div>';

  // Skills
  var skill = val('fSkill'), hobby = val('fHobby');
  if (skill || hobby) {
    html += '<div class="p-section"><div class="p-section-title">特技・趣味</div><div class="p-section-body">';
    if(skill) html += '＜特技＞'+skill+'<br>';
    if(hobby) html += '＜趣味＞'+hobby;
    html += '</div></div>';
  }

  // SNS
  var activeSns = snsEntries.filter(function(s){return s.handle;});
  if (activeSns.length) {
    html += '<div class="p-section"><div class="p-section-title">SNS</div><div class="p-sns-grid">';
    activeSns.forEach(function(s,i) {
      html += '<div class="p-sns-item"><div class="p-sns-qr" id="qr_'+i+'"></div><div>';
      html += '<div class="p-sns-name">'+s.platform+'</div>';
      html += '<div class="p-sns-handle">'+s.handle+'</div>';
      if(s.followers) html += '<div class="p-sns-followers">'+s.followers+' followers</div>';
      html += '</div></div>';
    });
    html += '</div></div>';
  }

  // Record
  var record = val('fRecord');
  if (record) {
    var items = record.split('\n').filter(function(l){return l.trim();});
    html += '<div class="p-section"><div class="p-section-title">実績</div><div class="p-section-body"><ul>';
    items.forEach(function(item){html += '<li>'+item.trim()+'</li>';});
    html += '</ul></div></div>';
  }

  // Sub photo + Contact side by side
  html += '<div style="display:flex;gap:16px;margin-top:12px;">';
  // Contact
  var agency=val('fAgency'),cName=val('fContactName'),cEmail=val('fContactEmail'),cTel=val('fContactTel');
  if(agency||cName||cEmail||cTel) {
    html += '<div class="p-contact" style="flex:1;margin-top:0;">';
    html += '<div class="p-contact-title">連絡先</div>';
    if(agency)html+='所属：'+agency+'<br>';
    if(cName)html+='担当：'+cName+'<br>';
    if(cEmail)html+='Email：'+cEmail+'<br>';
    if(cTel)html+='TEL：'+cTel;
    html += '</div>';
  }
  // Sub photo
  html += '<div style="width:170px;flex-shrink:0;">' + makePhotoSlotHtml(subSlot, 180) + '</div>';
  html += '</div>';

  page.innerHTML = html;
  wrap.appendChild(page);

  // QR codes
  setTimeout(function() {
    activeSns.forEach(function(s,i) {
      var url = getSnsUrl(s.platform, s.handle);
      var el = document.getElementById('qr_'+i);
      if(el&&url) { el.innerHTML=''; new QRCode(el,{text:url,width:44,height:44,colorDark:'#222',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.L}); }
    });
  }, 50);

  // Page 2: Extra photos
  var extras = photoSlots.slice(2).filter(function(s){return s.src;});
  if (extras.length) {
    var page2 = document.createElement('div');
    page2.className = 'page page2 page-break';
    var p2html = '<div class="p-section-title" style="margin-bottom:16px;">Photos</div><div class="p-photos-grid">';
    extras.forEach(function(s) { p2html += makePhotoSlotHtml(s, 280); });
    p2html += '</div>';
    page2.innerHTML = p2html;
    wrap.appendChild(page2);
  }

  // Setup drag on photo slots
  setupPhotoDrag();
}

function setupPhotoDrag() {
  document.querySelectorAll('.photo-slot').forEach(function(slot) {
    if (slot.classList.contains('photo-slot-empty')) return;
    var slotId = slot.dataset.slotId;
    var data = photoSlots.find(function(s){return s.id===slotId;});
    if (!data) return;

    var isDragging = false, startX, startY, origOX, origOY;
    slot.addEventListener('mousedown', function(e) {
      e.preventDefault(); isDragging = true;
      startX = e.clientX; startY = e.clientY;
      origOX = data.offsetX; origOY = data.offsetY;
    });
    document.addEventListener('mousemove', function(e) {
      if (!isDragging) return;
      var dx = (e.clientX - startX) / data.scale;
      var dy = (e.clientY - startY) / data.scale;
      data.offsetX = origOX + dx;
      data.offsetY = origOY + dy;
      var img = slot.querySelector('img');
      if (img) img.style.transform = 'scale('+data.scale+') translate('+data.offsetX+'px,'+data.offsetY+'px)';
    });
    document.addEventListener('mouseup', function() { isDragging = false; });

    // Mouse wheel for zoom
    slot.addEventListener('wheel', function(e) {
      e.preventDefault();
      var delta = e.deltaY > 0 ? -0.05 : 0.05;
      data.scale = Math.max(0.5, Math.min(3, data.scale + delta));
      var img = slot.querySelector('img');
      if (img) img.style.transform = 'scale('+data.scale+') translate('+data.offsetX+'px,'+data.offsetY+'px)';
      // Update slider in controls
      renderPhotoControls();
    });
  });
}
</script>
</body>
</html>
