<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>宣材プロフィール作成</title>
<script src="https://cdn.jsdelivr.net/npm/qrcodejs@1.0.0/qrcode.min.js"></script>
<style>
  @media print {
    html, body { margin: 0 !important; padding: 0 !important; background: #fff !important; }
    .input-panel { display: none !important; }
    .layout { display: block !important; }
    .preview-wrap { display: block !important; width: auto !important; padding: 0 !important; margin: 0 !important; background: #fff !important; overflow: visible !important; }
    .page { box-shadow: none !important; margin: 0 !important; height: 297mm !important; min-height: 0 !important; overflow: hidden !important; }
    .slot-label { display: none !important; }
    .photo-slot-empty-text { display: none !important; }
    .page-break { page-break-before: always; }
    @page { size: A4; margin: 0; }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Hiragino Mincho ProN", "Yu Mincho", "游明朝", serif; font-size: 12px; color: #222; background: #e8e8e8; }
  .layout { display: flex; height: 100vh; }
  .preview-wrap { flex: 1; overflow: auto; display: flex; flex-direction: column; align-items: center; padding: 24px; gap: 24px; background: #ddd; }
  .input-panel { width: 420px; background: #fff; border-left: 1px solid #ccc; overflow-y: auto; padding: 20px 24px; flex-shrink: 0; font-family: "Hiragino Sans", sans-serif; font-size: 13px; }
  .panel-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #222; }
  .section-label { font-size: 12px; font-weight: 700; color: #333; margin: 18px 0 8px; padding-top: 10px; border-top: 1px solid #eee; }
  .field { margin-bottom: 10px; }
  .field label { display: block; font-size: 11px; color: #666; margin-bottom: 3px; font-weight: 600; }
  .field input, .field textarea, .field select { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; font-family: inherit; }
  .field input:focus, .field textarea:focus { outline: none; border-color: #888; }
  .field textarea { resize: vertical; min-height: 50px; }
  .field-row { display: flex; gap: 8px; }
  .field-row .field { flex: 1; }
  .custom-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
  .custom-row input { flex: 1; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }
  .sns-row { display: flex; gap: 6px; margin-bottom: 6px; align-items: center; }
  .sns-row select { width: 90px; padding: 6px; font-size: 12px; }
  .sns-row input { flex: 1; padding: 6px 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 12px; }
  .sns-row input.followers { width: 70px; flex: none; }
  .btn-s { padding: 4px 10px; border: 1px solid #ccc; border-radius: 4px; background: #f5f5f5; font-size: 11px; cursor: pointer; font-family: inherit; }
  .btn-s:hover { background: #eee; }
  .btn-row { display: flex; gap: 6px; margin: 6px 0 12px; }
  .btn-print { width: 100%; padding: 12px; background: #222; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 16px; font-family: inherit; }
  .btn-print:hover { background: #444; }
  input[type="file"] { display: none; }

  /* Photo upload slots in panel */
  .photo-upload-slot { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; padding: 10px; background: #f8f8f8; border: 1px solid #eee; border-radius: 6px; }
  .photo-upload-num { width: 28px; height: 28px; background: #222; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; flex-shrink: 0; }
  .photo-upload-info { flex: 1; }
  .photo-upload-info .slot-name { font-size: 11px; font-weight: 700; color: #333; margin-bottom: 4px; }
  .photo-upload-thumb { width: 50px; height: 50px; border-radius: 4px; overflow: hidden; flex-shrink: 0; background: #eee; }
  .photo-upload-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .photo-upload-controls { display: flex; gap: 4px; align-items: center; margin-top: 4px; }
  .photo-upload-controls label { font-size: 10px; color: #888; }
  .photo-upload-controls input[type="range"] { width: 80px; }

  /* Page */
  .page { width: 210mm; height: 297mm; background: #fff; padding: 12mm 16mm; flex-shrink: 0; position: relative; font-size: 13px; overflow: hidden; }
  .p-top { display: flex; gap: 20px; margin-bottom: 14px; }
  .p-top-left { flex: 1; }
  .p-top-right { width: 300px; flex-shrink: 0; }
  .p-name-en { font-size: 12px; color: #888; margin-bottom: 2px; font-family: "Helvetica Neue", Helvetica, sans-serif; }
  .p-name-jp { font-size: 32px; font-weight: 900; margin-bottom: 18px; letter-spacing: 3px; }
  .p-info { border-collapse: collapse; }
  .p-info td { padding: 3px 0; font-size: 13px; vertical-align: top; line-height: 1.7; }
  .p-info td.l { font-weight: 700; white-space: nowrap; width: 120px; text-align: left; }
  .p-info td.colon { width: 16px; text-align: center; }
  .p-sec { margin-bottom: 12px; }
  .p-sec-t { font-size: 15px; font-weight: 700; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 2px solid #222; }
  .p-sec-b { font-size: 13px; line-height: 1.9; }
  .p-sec-b ul { padding-left: 18px; }
  .p-sec-b li { margin-bottom: 2px; }
  .p-sns-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .p-sns-item { display: flex; align-items: center; gap: 10px; }
  .p-sns-qr { width: 48px; height: 48px; flex-shrink: 0; }
  .p-sns-qr canvas, .p-sns-qr img { width: 48px !important; height: 48px !important; }
  .p-sns-name { font-weight: 700; font-size: 12px; }
  .p-sns-handle { color: #555; font-size: 11.5px; }
  .p-sns-followers { color: #888; font-size: 10px; }
  .p-contact { background: #f8f8f8; border: 1px solid #eee; border-radius: 4px; padding: 12px 16px; font-size: 12px; line-height: 1.9; }
  .p-contact-t { font-weight: 700; margin-bottom: 4px; font-size: 13px; }

  /* Photo slots on page */
  .photo-slot { width: 100%; overflow: hidden; border-radius: 4px; position: relative; cursor: move; background: #f0f0f0; }
  .photo-slot img { width: 100%; display: block; pointer-events: none; transform-origin: center center; }
  .photo-slot-empty-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%); color: #bbb; font-size: 11px; font-family: sans-serif; text-align: center; pointer-events: none; }
  .slot-label { position: absolute; top: 6px; left: 6px; background: rgba(0,0,0,0.6); color: #fff; font-size: 9px; padding: 2px 8px; border-radius: 10px; font-family: sans-serif; pointer-events: none; z-index: 2; }

  .p-bottom { display: flex; gap: 16px; margin-top: 14px; align-items: flex-end; }
  .p-bottom-contact { flex: 1; }
  .p-bottom-photo { width: 300px; flex-shrink: 0; }

  .page2 { padding-top: 20mm; }
  .p-photos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
</style>
</head>
<body>
<div class="layout">
  <div class="preview-wrap" id="previewWrap"></div>
  <div class="input-panel">
    <div class="panel-title">宣材プロフィール作成</div>

    <div class="section-label">基本情報</div>
    <div class="field-row">
      <div class="field"><label>名前（日本語）</label><input type="text" id="fNameJp" value="鹿野 花"></div>
      <div class="field"><label>名前（ローマ字）</label><input type="text" id="fNameEn" value="Hana Shikano"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>生年月日</label><input type="text" id="fBirth" value="2000/4/1"></div>
      <div class="field"><label>年齢</label><input type="text" id="fAge" value="26歳"></div>
    </div>
    <div class="field"><label>出身地</label><input type="text" id="fFrom" value="東京都世田谷区"></div>
    <div class="field-row">
      <div class="field"><label>身長・体重</label><input type="text" id="fBody" value="162cm 50kg"></div>
      <div class="field"><label>スリーサイズ</label><input type="text" id="fThree" value="B80 W60 H86"></div>
    </div>
    <div class="field-row">
      <div class="field"><label>靴サイズ</label><input type="text" id="fShoe" value="24.0cm"></div>
      <div class="field"><label>資格</label><input type="text" id="fLicense" value="普通自動車免許（AT限定）"></div>
    </div>

    <div class="section-label">追加項目</div>
    <div id="customFields"></div>
    <div class="btn-row"><button class="btn-s" onclick="addCustomField()">+ 項目追加</button></div>

    <div class="section-label">特技・趣味</div>
    <div class="field"><label>特技</label><input type="text" id="fSkill" value="ダンス、ピアノ"></div>
    <div class="field"><label>趣味</label><input type="text" id="fHobby" value="カフェ巡り、映画鑑賞、読書"></div>

    <div class="section-label">SNS</div>
    <div id="snsFields"></div>
    <div class="btn-row"><button class="btn-s" onclick="addSns()">+ SNS追加</button></div>

    <div class="section-label">実績</div>
    <div class="field"><textarea id="fRecord" rows="6">○○ブランド Webモデル
△△メーカー CM出演
□□アパレル カタログモデル
○○映画 エキストラ出演
△△舞台 アンサンブル出演
□□MV 出演</textarea></div>

    <div class="section-label">連絡先</div>
    <div class="field"><label>事務所 / 所属</label><input type="text" id="fAgency" value="サンプルプロダクション"></div>
    <div class="field"><label>担当者名</label><input type="text" id="fContactName" value="佐藤 一郎"></div>
    <div class="field-row">
      <div class="field"><label>メール</label><input type="text" id="fContactEmail" value="sato@sample-pro.co.jp"></div>
      <div class="field"><label>電話</label><input type="text" id="fContactTel" value="03-0000-0000"></div>
    </div>

    <div class="section-label">写真</div>
    <div id="photoControls"></div>
    <div class="btn-row"><button class="btn-s" onclick="addPhotoSlot()">+ 追加写真（2ページ目）</button></div>

    <button class="btn-print" onclick="window.print()">PDF出力</button>
  </div>
</div>

<script>
var photoSlots = [
  { id:'main', num:1, label:'メイン写真（右上）', src:null, scale:1, ox:0, oy:0, h:400 },
  { id:'sub', num:2, label:'サブ写真（右下）', src:null, scale:1, ox:0, oy:0, h:300 }
];
var snsEntries = [], customEntries = [];

addSns('Instagram','@hana_shikano','12,500');
addSns('X','@hana_shikano','8,200');
addSns('TikTok','@hana_shikano','5,100');
addSns('YouTube','@hana_shikano','3,800');

renderPhotoControls(); bindAll(); render();

function bindAll() {
  document.querySelectorAll('.input-panel input,.input-panel textarea').forEach(function(el){ el.addEventListener('input', render); });
}
function val(id){ var e=document.getElementById(id); return e?e.value.trim():''; }

// Photo
function renderPhotoControls() {
  var c = document.getElementById('photoControls'); c.innerHTML = '';
  photoSlots.forEach(function(s,i) {
    var d = document.createElement('div'); d.className = 'photo-upload-slot';
    var thumbHtml = s.src ? '<img src="'+s.src+'">' : '';
    var ctrlHtml = s.src ? '<div class="photo-upload-controls"><button class="btn-s" onclick="pickPhoto('+i+')">変更</button> <button class="btn-s" onclick="clearPhoto('+i+')">削除</button><label style="margin-left:8px;">拡大</label><input type="range" min="100" max="300" value="'+Math.round(s.scale*100)+'" oninput="setScale('+i+',this.value)"></div>' :
      '<button class="btn-s" onclick="pickPhoto('+i+')">画像を選択</button>';
    d.innerHTML = '<div class="photo-upload-num">'+s.num+'</div><div class="photo-upload-info"><div class="slot-name">❏ '+s.label+'</div>'+ctrlHtml+'</div><div class="photo-upload-thumb">'+thumbHtml+'</div>';
    c.appendChild(d);
  });
}
function pickPhoto(i) {
  var inp = document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.addEventListener('change',function(){ if(!this.files[0])return; var r=new FileReader(); r.onload=function(e){ photoSlots[i].src=e.target.result; photoSlots[i].scale=1; photoSlots[i].ox=0; photoSlots[i].oy=0; renderPhotoControls(); render(); }; r.readAsDataURL(this.files[0]); });
  inp.click();
}
function clearPhoto(i) { photoSlots[i].src=null; renderPhotoControls(); render(); }
function setScale(i,v) { photoSlots[i].scale=v/100; render(); }
function addPhotoSlot() {
  var n = photoSlots.length+1;
  photoSlots.push({id:'ex'+n,num:n,label:'追加写真 '+(n-2),src:null,scale:1,ox:0,oy:0,h:260});
  renderPhotoControls(); render();
}

// SNS
function addSns(p,h,f){ snsEntries.push({platform:p||'Instagram',handle:h||'',followers:f||''}); renderSns(); render(); }
function removeSns(i){ snsEntries.splice(i,1); renderSns(); render(); }
function renderSns(){
  var c=document.getElementById('snsFields'); c.innerHTML='';
  snsEntries.forEach(function(e,i){
    var r=document.createElement('div'); r.className='sns-row';
    r.innerHTML='<select data-i="'+i+'" data-f="platform"><option'+(e.platform==='Instagram'?' selected':'')+'>Instagram</option><option'+(e.platform==='X'?' selected':'')+'>X</option><option'+(e.platform==='TikTok'?' selected':'')+'>TikTok</option><option'+(e.platform==='YouTube'?' selected':'')+'>YouTube</option><option'+(e.platform==='その他'?' selected':'')+'>その他</option></select><input placeholder="@account" value="'+(e.handle||'')+'" data-i="'+i+'" data-f="handle"><input class="followers" placeholder="フォロワー" value="'+(e.followers||'')+'" data-i="'+i+'" data-f="followers"><button class="btn-s" onclick="removeSns('+i+')">×</button>';
    c.appendChild(r);
    r.querySelectorAll('input,select').forEach(function(el){el.addEventListener('input',function(){snsEntries[this.dataset.i][this.dataset.f]=this.value;render();});});
  });
}
function getSnsUrl(p,h){ var a=h.replace(/^@/,''); if(p==='Instagram')return'https://instagram.com/'+a; if(p==='X')return'https://x.com/'+a; if(p==='TikTok')return'https://tiktok.com/@'+a; if(p==='YouTube')return'https://youtube.com/@'+a; return''; }

// Custom fields
function addCustomField(){ customEntries.push({label:'',value:''}); renderCustom(); }
function removeCustom(i){ customEntries.splice(i,1); renderCustom(); render(); }
function renderCustom(){
  var c=document.getElementById('customFields'); c.innerHTML='';
  customEntries.forEach(function(e,i){
    var r=document.createElement('div'); r.className='custom-row';
    r.innerHTML='<input placeholder="項目名" value="'+(e.label||'')+'" data-i="'+i+'" data-f="label" style="width:80px;flex:none;"><input placeholder="内容" value="'+(e.value||'')+'" data-i="'+i+'" data-f="value"><button class="btn-s" onclick="removeCustom('+i+')">×</button>';
    c.appendChild(r);
    r.querySelectorAll('input').forEach(function(el){el.addEventListener('input',function(){customEntries[this.dataset.i][this.dataset.f]=this.value;render();});});
  });
}

function slotHtml(slot) {
  var h = slot.h;
  if (!slot.src) return '<div class="photo-slot" style="height:'+h+'px;"><span class="slot-label">❏ '+slot.num+'</span><div class="photo-slot-empty-text">❏ '+slot.num+'<br>'+slot.label+'</div></div>';
  return '<div class="photo-slot" style="height:'+h+'px;" data-sid="'+slot.id+'"><span class="slot-label">❏ '+slot.num+'</span><img src="'+slot.src+'" style="transform:scale('+slot.scale+') translate('+slot.ox+'px,'+slot.oy+'px);"></div>';
}

function render() {
  var w = document.getElementById('previewWrap'); w.innerHTML = '';
  var p = document.createElement('div'); p.className = 'page';
  var ms = photoSlots[0], ss = photoSlots[1];

  var html = '<div class="p-top"><div class="p-top-left">';
  html += '<div class="p-name-en">'+val('fNameEn')+'</div>';
  html += '<div class="p-name-jp">'+val('fNameJp')+'</div>';
  html += '<table class="p-info">';
  var flds = [['生年月日',val('fBirth')],['年齢',val('fAge')],['出身地',val('fFrom')],['身長・体重',val('fBody')],['スリーサイズ',val('fThree')],['靴サイズ',val('fShoe')],['資格',val('fLicense')]];
  customEntries.forEach(function(c){if(c.label||c.value)flds.push([c.label,c.value]);});
  flds.forEach(function(f){if(f[1])html+='<tr><td class="l">'+f[0]+'</td><td class="colon">：</td><td>'+f[1]+'</td></tr>';});
  html += '</table>';

  var sk=val('fSkill'),hb=val('fHobby');
  if(sk||hb){ html+='<div class="p-sec" style="margin-top:14px;"><div class="p-sec-t">特技・趣味</div><div class="p-sec-b">'; if(sk)html+='＜特技＞'+sk+'<br>'; if(hb)html+='＜趣味＞'+hb; html+='</div></div>'; }

  html += '</div><div class="p-top-right">'+slotHtml(ms)+'</div></div>';

  var asns=snsEntries.filter(function(s){return s.handle;});
  if(asns.length){
    html+='<div class="p-sec"><div class="p-sec-t">SNS</div><div class="p-sns-grid">';
    asns.forEach(function(s,i){ html+='<div class="p-sns-item"><div class="p-sns-qr" id="qr_'+i+'"></div><div><div class="p-sns-name">'+s.platform+'</div><div class="p-sns-handle">'+s.handle+'</div>'+(s.followers?'<div class="p-sns-followers">'+s.followers+' followers</div>':'')+'</div></div>'; });
    html+='</div></div>';
  }

  var rec=val('fRecord');
  if(rec){ var items=rec.split('\n').filter(function(l){return l.trim();}); html+='<div class="p-sec"><div class="p-sec-t">実績</div><div class="p-sec-b"><ul>'; items.forEach(function(it){html+='<li>'+it.trim()+'</li>';}); html+='</ul></div></div>'; }

  var ag=val('fAgency'),cn=val('fContactName'),ce=val('fContactEmail'),ct=val('fContactTel');
  html+='<div class="p-bottom">';
  if(ag||cn||ce||ct){
    html+='<div class="p-bottom-contact"><div class="p-contact"><div class="p-contact-t">連絡先</div>';
    if(ag)html+='所属：'+ag+'<br>'; if(cn)html+='担当：'+cn+'<br>'; if(ce)html+='Email：'+ce+'<br>'; if(ct)html+='TEL：'+ct;
    html+='</div></div>';
  }
  html+='<div class="p-bottom-photo">'+slotHtml(ss)+'</div></div>';

  p.innerHTML = html;
  w.appendChild(p);

  // QR
  setTimeout(function(){ asns.forEach(function(s,i){ var url=getSnsUrl(s.platform,s.handle); var el=document.getElementById('qr_'+i); if(el&&url){el.innerHTML='';new QRCode(el,{text:url,width:44,height:44,colorDark:'#222',colorLight:'#fff',correctLevel:QRCode.CorrectLevel.L});} }); },50);

  // Page 2
  var extras=photoSlots.slice(2).filter(function(s){return s.src;});
  if(extras.length){
    var p2=document.createElement('div'); p2.className='page page2 page-break';
    var h2='<div class="p-sec-t" style="margin-bottom:16px;">Photos</div><div class="p-photos-grid">';
    extras.forEach(function(s){h2+=slotHtml(s);}); h2+='</div>';
    p2.innerHTML=h2; w.appendChild(p2);
  }

  setupDrag();
}

function setupDrag(){
  document.querySelectorAll('.photo-slot[data-sid]').forEach(function(el){
    var sid=el.dataset.sid, d=photoSlots.find(function(s){return s.id===sid;});
    if(!d)return;
    var dragging=false,sx,sy,oox,ooy;
    el.addEventListener('mousedown',function(e){e.preventDefault();dragging=true;sx=e.clientX;sy=e.clientY;oox=d.ox;ooy=d.oy;});
    document.addEventListener('mousemove',function(e){if(!dragging)return;d.ox=oox+(e.clientX-sx)/d.scale;d.oy=ooy+(e.clientY-sy)/d.scale;var img=el.querySelector('img');if(img)img.style.transform='scale('+d.scale+') translate('+d.ox+'px,'+d.oy+'px)';});
    document.addEventListener('mouseup',function(){dragging=false;});
    el.addEventListener('wheel',function(e){e.preventDefault();d.scale=Math.max(0.5,Math.min(3,d.scale+(e.deltaY>0?-0.05:0.05)));var img=el.querySelector('img');if(img)img.style.transform='scale('+d.scale+') translate('+d.ox+'px,'+d.oy+'px)';renderPhotoControls();});
  });
}
</script>
</body>
</html>
