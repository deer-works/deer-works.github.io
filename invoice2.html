<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ご請求書</title>
<style>
  @media print {
    html, body { margin: 0 !important; padding: 0 !important; background: #fff !important; }
    .input-panel { display: none !important; }
    .layout { display: block !important; height: auto !important; background: #fff !important; }
    .preview-wrap { display: block !important; width: auto !important; height: auto !important; overflow: visible !important; margin: 0 !important; padding: 0 !important; background: #fff !important; border: none !important; box-shadow: none !important; }
    .page { box-shadow: none !important; margin: 0 !important; padding: 14mm 16mm !important; min-height: 0 !important; width: auto !important; background: #fff !important; }
    @page { size: A4; margin: 0; }
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Hiragino Mincho ProN", "Yu Mincho", "游明朝", serif; font-size: 12px; color: #222; background: #e8e8e8; }

  .layout { display: flex; height: 100vh; }
  .preview-wrap { flex: 1; overflow: auto; display: flex; justify-content: center; padding: 24px; background: #ddd; }
  .input-panel { width: 380px; background: #fff; border-left: 1px solid #ccc; overflow-y: auto; padding: 20px 24px; flex-shrink: 0; }

  .panel-title { font-size: 15px; font-weight: 700; margin-bottom: 16px; padding-bottom: 8px; border-bottom: 2px solid #222; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; color: #666; margin-bottom: 3px; font-weight: 600; }
  .field input, .field textarea { width: 100%; padding: 8px 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 13px; font-family: inherit; }
  .field input:focus, .field textarea:focus { outline: none; border-color: #888; }
  .field textarea { resize: vertical; min-height: 50px; }
  .field-row { display: flex; gap: 10px; }
  .field-row .field { flex: 1; }
  .section-label { font-size: 12px; font-weight: 700; color: #333; margin: 18px 0 8px; padding-top: 10px; border-top: 1px solid #eee; }
  .item-row { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 10px; align-items: center; padding-bottom: 10px; border-bottom: 1px solid #eee; }
  .item-row .item-no { width: 20px; text-align: center; color: #999; font-size: 11px; flex-shrink: 0; }
  .item-row input.item-name { flex: 1; min-width: 200px; padding: 10px; font-size: 14px; }
  .item-row input.item-qty { width: 60px; text-align: center; padding: 10px; font-size: 14px; }
  .item-row input.item-price { width: 110px; text-align: right; padding: 10px; font-size: 14px; }
  .item-row input.item-note { width: 100px; padding: 10px; font-size: 14px; }
  .btn-row { display: flex; gap: 8px; margin: 8px 0 14px; }
  .btn-small { padding: 5px 14px; border: 1px solid #ccc; border-radius: 4px; background: #f5f5f5; font-size: 11px; cursor: pointer; font-family: inherit; }
  .btn-small:hover { background: #eee; }
  .btn-print { width: 100%; padding: 12px; background: #222; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; margin-top: 16px; font-family: inherit; }
  .btn-print:hover { background: #444; }
  .check-field { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .check-field input[type="checkbox"] { width: 16px; height: 16px; }
  .check-field label { font-size: 12px; color: #333; margin-bottom: 0; }

  /* Page */
  .page { width: 210mm; min-height: 297mm; background: #fff; padding: 14mm 16mm; box-shadow: 0 2px 8px rgba(0,0,0,0.15); flex-shrink: 0; font-size: 11px; }

  .p-title { font-size: 20px; font-weight: 900; text-align: center; margin-bottom: 14px; letter-spacing: 6px; }
  .p-date-row { text-align: right; font-size: 11px; margin-bottom: 12px; }
  .p-to-line { font-size: 13px; font-weight: 700; margin-bottom: 14px; }

  .p-total-box { border: 2px solid #222; padding: 8px 14px; margin-bottom: 6px; display: inline-block; }
  .p-total-box-label { font-size: 13px; font-weight: 700; display: inline; }
  .p-total-box-amount { font-size: 16px; font-weight: 900; margin-left: 16px; display: inline; }
  .p-note-line { font-size: 10px; margin-bottom: 16px; }

  .p-middle { display: flex; justify-content: space-between; margin-bottom: 14px; }
  .p-middle-left { flex: 1; }
  .p-middle-right { width: 240px; text-align: right; font-size: 11px; line-height: 1.7; }
  .p-from-name { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
  .p-stamp { display: inline-block; width: 50px; height: 50px; border: 2px solid #cc0000; border-radius: 50%; text-align: center; line-height: 50px; color: #cc0000; font-size: 9px; font-weight: 700; margin-left: 8px; vertical-align: middle; }

  .p-subject { display: flex; align-items: center; margin-bottom: 14px; border-bottom: 1px solid #222; padding-bottom: 6px; }
  .p-subject-label { font-size: 11px; font-weight: 700; white-space: nowrap; margin-right: 12px; letter-spacing: 4px; }
  .p-subject-value { font-size: 11px; flex: 1; }
  .p-subject-right { font-size: 11px; margin-left: 20px; line-height: 1.6; }

  .p-table { width: 100%; border-collapse: collapse; margin-bottom: 0; border: 1px solid #222; }
  .p-table thead th { background: #eee; padding: 6px 8px; font-size: 10px; font-weight: 700; text-align: center; border: 1px solid #222; }
  .p-table tbody td { padding: 5px 8px; border: 1px solid #ccc; font-size: 10.5px; }
  .p-table tbody td.r { text-align: right; }
  .p-table tbody td.c { text-align: center; }

  .p-summary { width: 100%; border-collapse: collapse; }
  .p-summary td { padding: 4px 8px; font-size: 11px; border: 1px solid #222; }
  .p-summary td.label { text-align: center; font-weight: 700; background: #eee; }
  .p-summary td.value { text-align: right; width: 120px; }
  .p-summary tr.grand td { font-weight: 900; font-size: 12px; }

  .p-bank-box { border: 2px solid #222; border-radius: 6px; padding: 10px 14px; margin-top: 16px; font-size: 11px; }
  .p-bank-label { font-weight: 700; }
</style>
</head>
<body>

<div class="layout">
  <div class="preview-wrap">
    <div class="page" id="page">
      <div class="p-title">ご請求書</div>
      <div class="p-date-row">発行日： <span id="pDate"></span></div>
      <div class="p-to-line"><span id="pTo"></span> 御中</div>

      <div style="margin-bottom: 6px;">
        <div class="p-total-box">
          <span class="p-total-box-label">合計金額</span>
          <span class="p-total-box-amount" id="pGrandTotal">0 円</span>
        </div>
      </div>
      <div class="p-note-line">下記の通りご請求申し上げます。</div>

      <div class="p-middle">
        <div class="p-middle-left"></div>
        <div class="p-middle-right">
          <span class="p-from-name" id="pFromName"></span><span class="p-stamp" id="pStamp" style="display:none;"></span><br>
          <span id="pFromDetail"></span>
        </div>
      </div>

      <div class="p-subject">
        <span class="p-subject-label">件　名：</span>
        <span class="p-subject-value" id="pSubject"></span>
      </div>

      <table class="p-table">
        <thead>
          <tr>
            <th style="width:45%;">摘　要</th>
            <th style="width:14%;">単価</th>
            <th style="width:10%;">数量</th>
            <th style="width:16%;">金額</th>
            <th style="width:15%;">備考</th>
          </tr>
        </thead>
        <tbody id="pItems"></tbody>
      </table>

      <table class="p-summary" style="margin-left: auto; width: 280px; margin-top: -1px;">
        <tr><td class="label">小　計</td><td class="value" id="pSubtotal">0</td></tr>
        <tr><td class="label">消費税(10%)</td><td class="value" id="pTax">0</td></tr>
        <tr id="pWithholdingRow"><td class="label">源泉徴収費(10.21%)</td><td class="value" id="pWithholding">0</td></tr>
        <tr class="grand"><td class="label">合　計</td><td class="value" id="pTotal">0</td></tr>
      </table>

      <div class="p-bank-box">
        <span class="p-bank-label">お振込み先：</span> <span id="pBank"></span>
      </div>
    </div>
  </div>

  <div class="input-panel">
    <div class="panel-title">ご請求書</div>

    <div class="section-label">基本情報</div>
    <div class="field"><label>発行日</label><input type="text" id="fDate" value="" placeholder="2025年6月30日"></div>
    <div class="field"><label>請求先</label><input type="text" id="fTo" value="" placeholder="株式会社Gaudiy"></div>
    <div class="field"><label>件名</label><input type="text" id="fSubject" value="" placeholder="制作費他"></div>

    <div class="section-label">請求元</div>
    <div class="field"><label>名前</label><input type="text" id="fName" value=""></div>
    <div class="field"><label>住所</label><textarea id="fAddr" rows="2"></textarea></div>
    <div class="field"><label>電話番号</label><input type="text" id="fTel" value=""></div>

    <div class="section-label">明細</div>
    <div style="display:flex; gap:5px; margin-bottom:4px; font-size:10px; color:#999; padding-left:22px;">
      <span style="flex:1;">摘要</span>
      <span style="width:80px; text-align:right;">単価</span>
      <span style="width:44px; text-align:center;">数量</span>
      <span style="width:70px;">備考</span>
    </div>
    <div id="itemInputs"></div>
    <div class="btn-row">
      <button class="btn-small" onclick="addItem()">+ 行追加</button>
      <button class="btn-small" onclick="removeItem()">- 行削除</button>
    </div>

    <div class="check-field">
      <input type="checkbox" id="fWithholding" checked>
      <label for="fWithholding">源泉徴収費(10.21%)を差し引く</label>
    </div>

    <div class="section-label">振込先</div>
    <div class="field"><label>銀行名</label><input type="text" id="fBankName" value=""></div>
    <div class="field"><label>支店名</label><input type="text" id="fBranch" value=""></div>
    <div class="field-row">
      <div class="field"><label>口座種別</label><input type="text" id="fAccType" value="普通預金"></div>
      <div class="field"><label>口座番号</label><input type="text" id="fAccNum" value=""></div>
    </div>
    <div class="field"><label>口座名義</label><input type="text" id="fAccName" value=""></div>

    <button class="btn-print" onclick="window.print()">PDF出力</button>
  </div>
</div>

<script>
var ITEM_COUNT = 8;

function init() {
  var container = document.getElementById('itemInputs');
  for (var i = 0; i < ITEM_COUNT; i++) addItemRow(container, i);
  render();
  document.querySelectorAll('.input-panel input, .input-panel textarea').forEach(function(el) {
    el.addEventListener('input', render);
    el.addEventListener('change', render);
  });
}

function addItemRow(container, idx) {
  var div = document.createElement('div');
  div.className = 'item-row';
  div.innerHTML = '<span class="item-no">' + (idx + 1) + '</span>' +
    '<input class="item-name" placeholder="摘要" data-field="name">' +
    '<input class="item-price" placeholder="単価" data-field="price">' +
    '<input class="item-qty" placeholder="数量" value="1" data-field="qty">' +
    '<input class="item-note" placeholder="備考" data-field="note">';
  container.appendChild(div);
  div.querySelectorAll('input').forEach(function(el) {
    el.addEventListener('input', render);
    el.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.preventDefault();
        var inputs = Array.from(div.querySelectorAll('input'));
        var i = inputs.indexOf(el);
        if (i < inputs.length - 1) { inputs[i + 1].focus(); }
        else {
          var next = div.nextElementSibling;
          if (next) { var ni = next.querySelector('input'); if (ni) ni.focus(); }
        }
      }
    });
  });
}

function addItem() {
  var container = document.getElementById('itemInputs');
  addItemRow(container, container.children.length);
  render();
}

function removeItem() {
  var container = document.getElementById('itemInputs');
  if (container.children.length > 1) { container.removeChild(container.lastElementChild); render(); }
}

function render() {
  document.getElementById('pDate').textContent = document.getElementById('fDate').value;
  document.getElementById('pTo').textContent = document.getElementById('fTo').value;
  document.getElementById('pSubject').textContent = document.getElementById('fSubject').value;

  // From
  var name = document.getElementById('fName').value;
  document.getElementById('pFromName').textContent = name;
  if (name) {
    document.getElementById('pStamp').style.display = 'inline-block';
    document.getElementById('pStamp').textContent = name.slice(0, 3);
  } else {
    document.getElementById('pStamp').style.display = 'none';
  }

  var detailParts = [];
  var addr = document.getElementById('fAddr').value;
  if (addr) detailParts.push('住所：' + addr.replace(/\n/g, '<br>　　　'));
  var tel = document.getElementById('fTel').value;
  if (tel) detailParts.push('TEL：' + tel);
  document.getElementById('pFromDetail').innerHTML = detailParts.join('<br>');

  // Items
  var rows = document.querySelectorAll('#itemInputs .item-row');
  var tbody = document.getElementById('pItems');
  var html = '';
  var subtotal = 0;
  var totalRows = Math.max(rows.length, 8);

  rows.forEach(function(row, i) {
    var n = row.querySelector('[data-field="name"]').value;
    var p = parseFloat(row.querySelector('[data-field="price"]').value.replace(/,/g, '')) || 0;
    var q = parseFloat(row.querySelector('[data-field="qty"]').value) || 0;
    var note = row.querySelector('[data-field="note"]').value;
    var amount = p * q;
    subtotal += amount;
    html += '<tr><td>' + n + '</td><td class="r">' + (p ? p.toLocaleString() : '') + '</td><td class="c">' + (q || '') + '</td><td class="r">' + (amount ? amount.toLocaleString() : '') + '</td><td>' + note + '</td></tr>';
  });
  for (var i = rows.length; i < totalRows; i++) {
    html += '<tr><td>&nbsp;</td><td></td><td></td><td></td><td></td></tr>';
  }
  tbody.innerHTML = html;

  // Totals
  var useWithholding = document.getElementById('fWithholding').checked;
  var tax = Math.floor(subtotal * 0.1);
  var withholding = useWithholding ? Math.floor(subtotal * 0.1021) : 0;
  var total = subtotal + tax - withholding;

  document.getElementById('pSubtotal').textContent = subtotal ? subtotal.toLocaleString() : '0';
  document.getElementById('pTax').textContent = tax ? tax.toLocaleString() : '0';
  document.getElementById('pWithholding').textContent = withholding ? withholding.toLocaleString() : '0';
  document.getElementById('pWithholdingRow').style.display = useWithholding ? '' : 'none';
  document.getElementById('pTotal').textContent = total ? total.toLocaleString() : '0';
  document.getElementById('pGrandTotal').textContent = total ? total.toLocaleString() + ' 円' : '0 円';

  // Bank
  var bankParts = [];
  var bn = document.getElementById('fBankName').value;
  var br = document.getElementById('fBranch').value;
  var at = document.getElementById('fAccType').value;
  var an = document.getElementById('fAccNum').value;
  var nm = document.getElementById('fAccName').value;
  if (bn) bankParts.push(bn);
  if (br) bankParts.push(br + '支店');
  if (at) bankParts.push(at);
  if (an) bankParts.push('口座番号 ' + an);
  if (nm) bankParts.push('口座名義 ' + nm);
  document.getElementById('pBank').textContent = bankParts.join(' ');
}

init();
</script>
</body>
</html>
