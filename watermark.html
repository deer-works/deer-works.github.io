
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAMPLE透かしツール</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: "Hiragino Sans", "Noto Sans JP", sans-serif; background: #1a1a1a; color: #e8e8e8; min-height: 100vh; padding: 32px 20px; }
  h1 { font-size: 18px; font-weight: 700; margin-bottom: 8px; letter-spacing: 2px; text-align: center; }
  .subtitle { font-size: 12px; color: #888; margin-bottom: 24px; text-align: center; }

  .controls { display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap; justify-content: center; align-items: center; }
  .controls label { font-size: 12px; color: #aaa; display: flex; align-items: center; gap: 6px; }
  .controls input[type="range"] { width: 100px; }

  .drop-zone { width: 100%; max-width: 900px; min-height: 160px; border: 2px dashed #444; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: border-color 0.2s; margin: 0 auto 24px; }
  .drop-zone:hover, .drop-zone.dragover { border-color: #888; }
  .drop-zone-text { font-size: 14px; color: #666; text-align: center; padding: 40px; }
  input[type="file"] { display: none; }

  .actions { display: flex; gap: 12px; justify-content: center; margin-bottom: 24px; }
  .btn { padding: 10px 28px; border: none; border-radius: 6px; font-size: 13px; font-weight: 700; cursor: pointer; font-family: inherit; }
  .btn-primary { background: #fff; color: #222; }
  .btn-primary:hover { background: #ddd; }
  .btn-secondary { background: #333; color: #fff; border: 1px solid #555; }
  .btn-secondary:hover { background: #444; }
  .btn:disabled { opacity: 0.3; cursor: default; }

  /* Image grid */
  .image-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; max-width: 1200px; margin: 0 auto; }
  .image-card { background: #252525; border-radius: 8px; overflow: hidden; border: 1px solid #333; }
  .image-card-preview { position: relative; overflow: hidden; cursor: default; }
  .image-card-preview img { width: 100%; display: block; }
  .image-card-wm { position: absolute; cursor: grab; user-select: none; -webkit-user-select: none; }
  .image-card-wm:active { cursor: grabbing; }
  .image-card-wm span { font-family: Arial, Helvetica, sans-serif; font-weight: 900; white-space: nowrap; paint-order: stroke fill; }
  .image-card-info { padding: 8px 12px; display: flex; justify-content: space-between; align-items: center; }
  .image-card-name { font-size: 11px; color: #888; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
  .image-card-remove { background: none; border: none; color: #666; cursor: pointer; font-size: 16px; padding: 0 4px; }
  .image-card-remove:hover { color: #e07f7f; }

  .count-label { text-align: center; font-size: 12px; color: #666; margin-bottom: 16px; }
</style>
</head>
<body>

<h1>SAMPLE WATERMARK</h1>
<div class="subtitle">画像にSAMPLE透かしを入れる（ドラッグで位置調整可）</div>

<div class="controls">
  <label>文字透明度 <input type="range" id="opacity" min="10" max="80" value="40"> <span id="opacityVal">40%</span></label>
  <label>枠透明度 <input type="range" id="strokeOpacity" min="0" max="100" value="80"> <span id="strokeOpacityVal">80%</span></label>
  <label>サイズ <input type="range" id="wmSize" min="10" max="50" value="22"> <span id="wmSizeVal">22%</span></label>
</div>

<div class="drop-zone" id="dropZone">
  <div class="drop-zone-text">
    クリックまたはドラッグ＆ドロップで画像をアップロード<br>
    <span style="font-size:11px; color:#555;">複数画像OK・追加アップロード可</span>
  </div>
</div>
<input type="file" id="fileInput" accept="image/*" multiple>

<div class="actions">
  <button class="btn btn-primary" id="btnDownloadAll" disabled>一括ダウンロード</button>
  <button class="btn btn-secondary" id="btnClear" disabled>全てクリア</button>
</div>

<div class="count-label" id="countLabel"></div>
<div class="image-grid" id="imageGrid"></div>

<canvas id="renderCanvas" style="display:none;"></canvas>

<script>
var entries = []; // { file, img, posX(0-1), posY(0-1), id }
var nextId = 0;

var dropZone = document.getElementById('dropZone');
var fileInput = document.getElementById('fileInput');
var grid = document.getElementById('imageGrid');

dropZone.addEventListener('click', function() { fileInput.click(); });
dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('dragover'); });
dropZone.addEventListener('drop', function(e) { e.preventDefault(); dropZone.classList.remove('dragover'); addFiles(e.dataTransfer.files); });
fileInput.addEventListener('change', function() { addFiles(fileInput.files); fileInput.value = ''; });

document.getElementById('opacity').addEventListener('input', function() {
  document.getElementById('opacityVal').textContent = this.value + '%';
  updateAllWatermarks();
});
document.getElementById('strokeOpacity').addEventListener('input', function() {
  document.getElementById('strokeOpacityVal').textContent = this.value + '%';
  updateAllWatermarks();
});
document.getElementById('wmSize').addEventListener('input', function() {
  document.getElementById('wmSizeVal').textContent = this.value + '%';
  updateAllWatermarks();
});

document.getElementById('btnClear').addEventListener('click', function() {
  entries = [];
  renderGrid();
});

document.getElementById('btnDownloadAll').addEventListener('click', downloadAll);

function addFiles(files) {
  var arr = Array.from(files).filter(function(f) { return f.type.startsWith('image/'); });
  var loaded = 0;
  arr.forEach(function(file) {
    var img = new Image();
    img.onload = function() {
      entries.push({ file: file, img: img, posX: 0.5, posY: 0.5, id: nextId++ });
      loaded++;
      if (loaded === arr.length) renderGrid();
    };
    img.src = URL.createObjectURL(file);
  });
}

function renderGrid() {
  grid.innerHTML = '';
  document.getElementById('btnDownloadAll').disabled = entries.length === 0;
  document.getElementById('btnClear').disabled = entries.length === 0;
  document.getElementById('countLabel').textContent = entries.length ? entries.length + '枚' : '';

  entries.forEach(function(entry) {
    var card = document.createElement('div');
    card.className = 'image-card';

    var preview = document.createElement('div');
    preview.className = 'image-card-preview';

    var img = document.createElement('img');
    img.src = entry.img.src;
    preview.appendChild(img);

    var wm = document.createElement('div');
    wm.className = 'image-card-wm';
    var wmText = document.createElement('span');
    wmText.textContent = 'SAMPLE';
    wm.appendChild(wmText);
    preview.appendChild(wm);

    var info = document.createElement('div');
    info.className = 'image-card-info';
    var name = document.createElement('div');
    name.className = 'image-card-name';
    name.textContent = entry.file.name;
    var removeBtn = document.createElement('button');
    removeBtn.className = 'image-card-remove';
    removeBtn.textContent = '\u00D7';
    removeBtn.addEventListener('click', function() {
      entries = entries.filter(function(e) { return e.id !== entry.id; });
      renderGrid();
    });
    info.appendChild(name);
    info.appendChild(removeBtn);

    card.appendChild(preview);
    card.appendChild(info);
    grid.appendChild(card);

    // After layout, set watermark size and position
    img.addEventListener('load', function() {
      setupWatermark(preview, wm, wmText, entry);
    });
    // Also run immediately if cached
    if (img.complete) {
      setTimeout(function() { setupWatermark(preview, wm, wmText, entry); }, 10);
    }
  });
}

function setupWatermark(preview, wm, wmText, entry) {
  var pw = preview.offsetWidth;
  var ph = preview.offsetHeight;
  if (!pw) return;

  var opacity = parseInt(document.getElementById('opacity').value) / 100;
  var strokeOpacity = parseInt(document.getElementById('strokeOpacity').value) / 100;
  var sizeRatio = parseInt(document.getElementById('wmSize').value) / 100;
  var fontSize = pw * sizeRatio;
  var stroke = Math.max(fontSize * 0.03, 1);

  wmText.style.fontSize = fontSize + 'px';
  wmText.style.color = 'rgba(0,0,0,' + opacity + ')';
  wmText.style.webkitTextStroke = stroke + 'px rgba(255,255,255,' + strokeOpacity + ')';

  var wmW = wm.offsetWidth;
  var wmH = wm.offsetHeight;
  wm.style.left = (entry.posX * pw - wmW / 2) + 'px';
  wm.style.top = (entry.posY * ph - wmH / 2) + 'px';

  // Drag
  var isDragging = false;
  var startX, startY, origLeft, origTop;

  function onStart(e) {
    e.preventDefault();
    e.stopPropagation();
    isDragging = true;
    var p = e.touches ? e.touches[0] : e;
    startX = p.clientX;
    startY = p.clientY;
    origLeft = wm.offsetLeft;
    origTop = wm.offsetTop;
  }
  function onMove(e) {
    if (!isDragging) return;
    e.preventDefault();
    var p = e.touches ? e.touches[0] : e;
    var dx = p.clientX - startX;
    var dy = p.clientY - startY;
    var newX = Math.max(0, Math.min(pw - wm.offsetWidth, origLeft + dx));
    var newY = Math.max(0, Math.min(ph - wm.offsetHeight, origTop + dy));
    wm.style.left = newX + 'px';
    wm.style.top = newY + 'px';
    entry.posX = (newX + wm.offsetWidth / 2) / pw;
    entry.posY = (newY + wm.offsetHeight / 2) / ph;
  }
  function onEnd() { isDragging = false; }

  wm.addEventListener('mousedown', onStart);
  wm.addEventListener('touchstart', onStart, { passive: false });
  document.addEventListener('mousemove', onMove);
  document.addEventListener('touchmove', onMove, { passive: false });
  document.addEventListener('mouseup', onEnd);
  document.addEventListener('touchend', onEnd);
}

function updateAllWatermarks() {
  var cards = grid.querySelectorAll('.image-card-preview');
  cards.forEach(function(preview, i) {
    if (!entries[i]) return;
    var wm = preview.querySelector('.image-card-wm');
    var wmText = wm.querySelector('span');
    setupWatermark(preview, wm, wmText, entries[i]);
  });
}

function downloadAll() {
  var opacity = parseInt(document.getElementById('opacity').value) / 100;
  var strokeOpacity = parseInt(document.getElementById('strokeOpacity').value) / 100;
  var sizeRatio = parseInt(document.getElementById('wmSize').value) / 100;

  entries.forEach(function(entry) {
    var c = document.createElement('canvas');
    var cx = c.getContext('2d');
    var img = entry.img;
    c.width = img.naturalWidth;
    c.height = img.naturalHeight;
    cx.drawImage(img, 0, 0);

    var size = img.naturalWidth * sizeRatio;
    var stroke = Math.max(size * 0.03, 2);
    var posX = entry.posX * img.naturalWidth;
    var posY = entry.posY * img.naturalHeight;

    cx.save();
    cx.translate(posX, posY);
    cx.font = '900 ' + size + 'px Arial, Helvetica, sans-serif';
    cx.textAlign = 'center';
    cx.textBaseline = 'middle';
    cx.lineJoin = 'round';
    cx.strokeStyle = 'rgba(255,255,255,' + strokeOpacity + ')';
    cx.lineWidth = stroke;
    cx.strokeText('SAMPLE', 0, 0);
    cx.fillStyle = 'rgba(0,0,0,' + opacity + ')';
    cx.fillText('SAMPLE', 0, 0);
    cx.restore();

    c.toBlob(function(blob) {
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'SAMPLE_' + entry.file.name;
      a.click();
    }, 'image/png');
  });
}
</script>
</body>
</html>
